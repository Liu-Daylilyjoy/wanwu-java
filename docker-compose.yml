services:
  bff:
    profiles: ["app", "full"]
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_MODULE: wanwu-service-bff
    image: wanwu-java/bff:0.1.0-SNAPSHOT
    container_name: wanwu-java-bff
    environment:
      DUBBO_REGISTRY_ADDRESS: ${DUBBO_REGISTRY_ADDRESS:-nacos://nacos:8848}
      JAVA_OPTS: ${WANWU_BFF_JAVA_OPTS:-}
    ports:
      - "8080:8080"
      - "20880:20880"
    depends_on:
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  iam:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_MODULE: wanwu-service-iam
    image: wanwu-java/iam:0.1.0-SNAPSHOT
    container_name: wanwu-java-iam
    environment:
      DUBBO_REGISTRY_ADDRESS: ${DUBBO_REGISTRY_ADDRESS:-nacos://nacos:8848}
      JAVA_OPTS: ${WANWU_IAM_JAVA_OPTS:-}
    ports:
      - "8081:8081"
      - "20881:20881"
    depends_on:
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  app:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_MODULE: wanwu-service-app
    image: wanwu-java/app:0.1.0-SNAPSHOT
    container_name: wanwu-java-app
    environment:
      DUBBO_REGISTRY_ADDRESS: ${DUBBO_REGISTRY_ADDRESS:-nacos://nacos:8848}
      JAVA_OPTS: ${WANWU_APP_JAVA_OPTS:-}
    ports:
      - "8086:8086"
      - "20886:20886"
    depends_on:
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8086/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    profiles: ["full"]
    build:
      context: .
      dockerfile: web/Dockerfile
    image: wanwu-java/web:0.1.0-SNAPSHOT
    container_name: wanwu-java-web
    ports:
      - "3000:80"
    depends_on:
      bff:
        condition: service_healthy

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: wanwu-java-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - "8848:8848"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8848/nacos/v1/console/health/readiness | grep -q OK"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs

  redis:
    profiles: ["infra"]
    image: redis:7-alpine
    container_name: wanwu-java-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  mysql:
    profiles: ["infra"]
    image: mysql:8.0
    container_name: wanwu-java-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${WANWU_MYSQL_ROOT_PASSWORD:-}
      MYSQL_DATABASE: ${WANWU_MYSQL_DATABASE:-wanwu}
      MYSQL_USER: ${WANWU_MYSQL_USER:-}
      MYSQL_PASSWORD: ${WANWU_MYSQL_PASSWORD:-}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  nacos-data:
  nacos-logs:
  redis-data:
  mysql-data:
