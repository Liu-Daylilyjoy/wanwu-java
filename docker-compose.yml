services:
  bff:
    profiles: ["app", "full"]
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_MODULE: wanwu-service-bff
    image: wanwu-java/bff:0.1.0-SNAPSHOT
    container_name: wanwu-java-bff
    environment:
      DUBBO_REGISTRY_ADDRESS: ${DUBBO_REGISTRY_ADDRESS:-nacos://nacos:8848}
      JAVA_OPTS: ${WANWU_BFF_JAVA_OPTS:-}
    ports:
      - "8080:8080"
      - "20880:20880"
    depends_on:
      nacos:
        condition: service_healthy
      iam:
        condition: service_healthy
      model:
        condition: service_healthy
      knowledge:
        condition: service_healthy
      mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  knowledge:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_MODULE: wanwu-service-knowledge
    image: wanwu-java/knowledge:0.1.0-SNAPSHOT
    container_name: wanwu-java-knowledge
    environment:
      DUBBO_REGISTRY_ADDRESS: ${DUBBO_REGISTRY_ADDRESS:-nacos://nacos:8848}
      JAVA_OPTS: ${WANWU_KNOWLEDGE_JAVA_OPTS:-}
    ports:
      - "8083:8083"
      - "20883:20883"
    depends_on:
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  iam:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_MODULE: wanwu-service-iam
    image: wanwu-java/iam:0.1.0-SNAPSHOT
    container_name: wanwu-java-iam
    environment:
      DUBBO_REGISTRY_ADDRESS: ${DUBBO_REGISTRY_ADDRESS:-nacos://nacos:8848}
      SPRING_DATASOURCE_URL: ${WANWU_IAM_DATASOURCE_URL:-jdbc:mysql://mysql:3306/iam_service?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&serverTimezone=Asia/Shanghai}
      SPRING_DATASOURCE_USERNAME: ${WANWU_IAM_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${WANWU_IAM_DATASOURCE_PASSWORD:-}
      JAVA_OPTS: ${WANWU_IAM_JAVA_OPTS:-}
    ports:
      - "8081:8081"
      - "20881:20881"
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  model:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_MODULE: wanwu-service-model
    image: wanwu-java/model:0.1.0-SNAPSHOT
    container_name: wanwu-java-model
    environment:
      DUBBO_REGISTRY_ADDRESS: ${DUBBO_REGISTRY_ADDRESS:-nacos://nacos:8848}
      SPRING_DATASOURCE_URL: ${WANWU_MODEL_DATASOURCE_URL:-jdbc:mysql://mysql:3306/model_service?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&serverTimezone=Asia/Shanghai}
      SPRING_DATASOURCE_USERNAME: ${WANWU_MODEL_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${WANWU_MODEL_DATASOURCE_PASSWORD:-}
      JAVA_OPTS: ${WANWU_MODEL_JAVA_OPTS:-}
    ports:
      - "8082:8082"
      - "20882:20882"
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  mcp:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_MODULE: wanwu-service-mcp
    image: wanwu-java/mcp:0.1.0-SNAPSHOT
    container_name: wanwu-java-mcp
    environment:
      DUBBO_REGISTRY_ADDRESS: ${DUBBO_REGISTRY_ADDRESS:-nacos://nacos:8848}
      JAVA_OPTS: ${WANWU_MCP_JAVA_OPTS:-}
    ports:
      - "8087:8087"
      - "20887:20887"
    depends_on:
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8087/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  app:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_MODULE: wanwu-service-app
    image: wanwu-java/app:0.1.0-SNAPSHOT
    container_name: wanwu-java-app
    environment:
      DUBBO_REGISTRY_ADDRESS: ${DUBBO_REGISTRY_ADDRESS:-nacos://nacos:8848}
      SPRING_DATASOURCE_URL: ${WANWU_APP_DATASOURCE_URL:-jdbc:mysql://mysql:3306/app_service?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&serverTimezone=Asia/Shanghai}
      SPRING_DATASOURCE_USERNAME: ${WANWU_APP_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${WANWU_APP_DATASOURCE_PASSWORD:-}
      JAVA_OPTS: ${WANWU_APP_JAVA_OPTS:-}
    ports:
      - "8086:8086"
      - "20886:20886"
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8086/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    profiles: ["full"]
    build:
      context: .
      dockerfile: web/Dockerfile
    image: wanwu-java/web:0.1.0-SNAPSHOT
    container_name: wanwu-java-web
    ports:
      - "3000:80"
    depends_on:
      bff:
        condition: service_healthy

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: wanwu-java-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - "8848:8848"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8848/nacos/v1/console/health/readiness | grep -q OK"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs

  redis:
    profiles: ["infra"]
    image: redis:7-alpine
    container_name: wanwu-java-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  mysql:
    profiles: ["infra", "full"]
    image: ${WANWU_MYSQL_IMAGE:-mysql:8.0.32}
    container_name: wanwu-java-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${WANWU_MYSQL_ROOT_PASSWORD:-}
      MYSQL_ALLOW_EMPTY_PASSWORD: ${WANWU_MYSQL_ALLOW_EMPTY_PASSWORD:-yes}
      MYSQL_DATABASE: ${WANWU_MYSQL_DATABASE:-app_service}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./configs/middleware/mysql/initdb.d:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_bin
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  nacos-data:
  nacos-logs:
  redis-data:
  mysql-data:
