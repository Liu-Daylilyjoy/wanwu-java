services:
  bff:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_MODULE: wanwu-service-bff
    image: wanwu-java/bff:0.1.0-SNAPSHOT
    container_name: wanwu-java-bff
    environment:
      DUBBO_REGISTRY_ADDRESS: ${DUBBO_REGISTRY_ADDRESS:-N/A}
      JAVA_OPTS: ${WANWU_BFF_JAVA_OPTS:-}
    ports:
      - "8080:8080"
      - "20880:20880"

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: wanwu-java-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs

  redis:
    image: redis:7-alpine
    container_name: wanwu-java-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  mysql:
    image: mysql:8.0
    container_name: wanwu-java-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${WANWU_MYSQL_ROOT_PASSWORD:-}
      MYSQL_DATABASE: ${WANWU_MYSQL_DATABASE:-wanwu}
      MYSQL_USER: ${WANWU_MYSQL_USER:-}
      MYSQL_PASSWORD: ${WANWU_MYSQL_PASSWORD:-}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  nacos-data:
  nacos-logs:
  redis-data:
  mysql-data:
