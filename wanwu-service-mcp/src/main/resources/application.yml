server:
  port: 8087

spring:
  application:
    name: wanwu-service-mcp
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mcp_service?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
    register-mode: ${DUBBO_REGISTER_MODE:instance}
  protocol:
    name: dubbo
    port: 20887
  registry:
    address: ${DUBBO_REGISTRY_ADDRESS:N/A}
  consumer:
    check: false
    timeout: 5000
  provider:
    timeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info
