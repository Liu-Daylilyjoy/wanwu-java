server:
  port: 8086

spring:
  application:
    name: wanwu-service-app

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  protocol:
    name: dubbo
    port: 20886
  registry:
    address: ${DUBBO_REGISTRY_ADDRESS:N/A}
  consumer:
    check: false
    timeout: 5000
  provider:
    timeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info
